<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found · TaskQuest</title>
  <meta name="description" content="The page you are looking for does not exist. Return to TaskQuest dashboard." />
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--bg, #0f0c26);
      color: var(--text, #e2e8f0);
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Poppins', sans-serif;
    }
    .error-title {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0.5rem 0;
      font-family: 'Poppins', sans-serif;
    }
    .error-message {
      font-size: 1rem;
      opacity: 0.75;
      max-width: 400px;
      margin: 0.5rem auto 2rem;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-actions a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.3);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }
    .error-illustration {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="error-illustration">
    <i class="ri-compass-discover-line"></i>
  </div>
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-message">The quest you seek does not exist. It may have been moved, deleted, or never existed at all.</p>
  <div class="error-actions">
    <a href="/" class="btn-primary"><i class="ri-home-4-line"></i> Return to Dashboard</a>
    <a href="/pages/docs.html" class="btn-secondary"><i class="ri-book-read-line"></i> Browse Docs</a>
  </div>
</body>
</html>
