name: Require Changelog

on:
  pull_request_target:
    types: [opened, synchronize, edited]

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check for CHANGELOG updates
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const hasChangelogUpdate = files.some(f => f.filename === 'CHANGELOG.md');
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const isDocOnly = files.every(f => f.filename.endsWith('.md'));
            const isWorkflowOnly = files.every(f => f.filename.startsWith('.github/'));

            // Skip changelog requirement for docs-only and workflow-only PRs
            if (isDocOnly || isWorkflowOnly) {
              console.log('Skipping changelog check for docs/workflow-only PR');
              return;
            }

            if (!hasChangelogUpdate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '⚠️ **Changelog Reminder**\n\n' +
                      'This PR does not include an update to `CHANGELOG.md`. ' +
                      'Please add a brief entry describing your changes under the "Unreleased" section.'
              });
            }
