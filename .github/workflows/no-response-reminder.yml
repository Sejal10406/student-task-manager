name: No Response Reminder

on:
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 10 * * 1-5'

jobs:
  no-response:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check for no-response
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 14
          days-before-close: 7
          only-labels: 'awaiting-response'
          stale-issue-label: 'awaiting-response'
          stale-pr-label: 'awaiting-response'
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            If the issue persists, please provide the requested information and reopen.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Please address the feedback and reopen when ready.
          days-before-issue-stale: 14
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          remove-stale-when-updated: true
