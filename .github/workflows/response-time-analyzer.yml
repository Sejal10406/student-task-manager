name: Response Time Analyzer

on:
  issues:
    types: [labeled]
  pull_request:
    types: [review_requested]

jobs:
  analyze-response:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Calculate and comment response time
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue || context.payload.pull_request;
            const createdAt = new Date(issue.created_at);
            const now = new Date();
            const responseTimeMs = now - createdAt;
            const responseTimeHours = Math.floor(responseTimeMs / 3600000);
            const responseTimeDays = Math.floor(responseTimeHours / 24);
            
            let responseTimeStr;
            if (responseTimeDays > 0) {
              responseTimeStr = `${responseTimeDays} day(s) ${responseTimeHours % 24} hour(s)`;
            } else {
              responseTimeStr = `${responseTimeHours} hour(s)`;
            }

            const isIssue = !!context.payload.issue;
            const itemNumber = issue.number;

            // Only comment if this is a first response event
            if (context.payload.action === 'labeled' && context.payload.label?.name === 'needs-triage') {
              return; // Don't analyze triage labels
            }

            // Post response time analysis as a comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: itemNumber,
              body: `⏱️ **Response Time Analysis**\n\n` +
                    `This ${isIssue ? 'issue' : 'pull request'} received attention **${responseTimeStr}** after creation.\n\n` +
                    (responseTimeHours < 2
                      ? '✅ Excellent response time! Thanks for the quick turnaround.'
                      : responseTimeHours < 24
                        ? '👍 Good response time. Within the expected 24-hour window.'
                        : responseTimeDays < 3
                          ? '⚠️ Moderate response time. Consider checking for faster follow-ups.'
                          : '🔴 Extended response time. Please prioritize reviewing this item.')
            });
