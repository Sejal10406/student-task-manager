name: Issue Labeler

on:
  issues:
    types: [opened]

jobs:
  label-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Label by issue content
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body?.toLowerCase() || '';
            const labels = [];

            if (title.includes('bug') || body.includes('bug') || title.includes('error') || body.includes('error')) {
              labels.push('bug');
            }
            if (title.includes('feature') || body.includes('feature') || title.includes('request') || body.includes('request')) {
              labels.push('enhancement');
            }
            if (title.includes('doc') || body.includes('documentation') || title.includes('readme')) {
              labels.push('documentation');
            }
            if (title.includes('accessib') || body.includes('accessib') || title.includes('a11y') || body.includes('a11y')) {
              labels.push('accessibility');
            }
            if (title.includes('security') || body.includes('security') || title.includes('csp') || body.includes('xss')) {
              labels.push('security');
            }
            if (title.includes('perform') || body.includes('perform') || title.includes('slow') || body.includes('optimize')) {
              labels.push('performance');
            }
            if (title.includes('ui') || body.includes('ui') || title.includes('ux') || title.includes('design')) {
              labels.push('ui/ux');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
