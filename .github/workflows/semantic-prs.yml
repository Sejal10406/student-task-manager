name: Semantic Pull Request

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?:\s.+$/;
            
            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" does not follow Conventional Commits format.\n\n` +
                `Expected format: <type>(<scope>): <description>\n\n` +
                `Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert\n\n` +
                `Examples:\n` +
                `  feat: add task export feature\n` +
                `  fix(ui): resolve sidebar overflow on mobile\n` +
                `  docs: improve contributing guide\n` +
                `  refactor: extract toast helper module\n\n` +
                `Please update your PR title to follow this convention.`
              );
            } else {
              console.log(`✅ PR title "${title}" follows Conventional Commits format.`);
            }
