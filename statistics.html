<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Statistics Component Example</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 2rem;
      background-color: #0f172a;
      color: #f1f5f9;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
      max-width: 800px;
    }
    
    /* Stat Card Component */
    .stat-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }
    
    .stat-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .stat-icon.primary { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; }
    .stat-icon.success { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .stat-icon.warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .stat-icon.info { background: rgba(6, 182, 212, 0.15); color: #06b6d4; }
    
    .stat-title {
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #f8fafc;
      line-height: 1.2;
    }
    
    .stat-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    
    .stat-trend {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    
    .stat-trend.up { color: #10b981; }
    .stat-trend.down { color: #ef4444; }
    .stat-trend.neutral { color: #94a3b8; }
    
    .stat-footer-text {
      color: #64748b;
    }
  </style>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
</head>
<body>
  <h2>Statistics Components</h2>
  
  <div class="stats-grid">
    <!-- Stat Card 1 -->
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-icon primary"><i class="ri-check-double-line"></i></div>
        <div class="stat-title">Tasks Completed</div>
      </div>
      <div class="stat-value">124</div>
      <div class="stat-footer">
        <span class="stat-trend up"><i class="ri-arrow-up-line"></i> 12%</span>
        <span class="stat-footer-text">from last week</span>
      </div>
    </div>
    
    <!-- Stat Card 2 -->
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-icon warning"><i class="ri-fire-fill"></i></div>
        <div class="stat-title">Current Streak</div>
      </div>
      <div class="stat-value">12 Days</div>
      <div class="stat-footer">
        <span class="stat-trend up"><i class="ri-arrow-up-line"></i> 2</span>
        <span class="stat-footer-text">best is 15 days</span>
      </div>
    </div>
    
    <!-- Stat Card 3 -->
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-icon success"><i class="ri-focus-2-line"></i></div>
        <div class="stat-title">Focus Time</div>
      </div>
      <div class="stat-value">14.5h</div>
      <div class="stat-footer">
        <span class="stat-trend down"><i class="ri-arrow-down-line"></i> 5%</span>
        <span class="stat-footer-text">from last week</span>
      </div>
    </div>
    
    <!-- Stat Card 4 -->
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-icon info"><i class="ri-award-fill"></i></div>
        <div class="stat-title">Total XP</div>
      </div>
      <div class="stat-value">2,450</div>
      <div class="stat-footer">
        <span class="stat-trend neutral"><i class="ri-subtract-line"></i></span>
        <span class="stat-footer-text">Level 8 Player</span>
      </div>
    </div>
  </div>

  <h2 style="margin-top: 60px;">Web Component Usage</h2>
  <div class="stats-grid">
    <stat-card title="Study Sessions" value="42" icon="ri-book-open-line" color="primary" trend="+8%" trend-type="up" footer="Total sessions"></stat-card>
  </div>

  <script>
    class StatCard extends HTMLElement {
      connectedCallback() {
        const title = this.getAttribute('title') || 'Statistic';
        const value = this.getAttribute('value') || '0';
        const icon = this.getAttribute('icon') || 'ri-bar-chart-2-line';
        const color = this.getAttribute('color') || 'info';
        const trend = this.getAttribute('trend') || '';
        const trendType = this.getAttribute('trend-type') || 'neutral';
        const footer = this.getAttribute('footer') || '';
        
        let trendIcon = 'ri-subtract-line';
        if (trendType === 'up') trendIcon = 'ri-arrow-up-line';
        if (trendType === 'down') trendIcon = 'ri-arrow-down-line';
        
        const trendHtml = trend ? `<span class="stat-trend ${trendType}"><i class="${trendIcon}"></i> ${trend}</span>` : '';
        
        this.innerHTML = `
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon ${color}"><i class="${icon}"></i></div>
              <div class="stat-title">${title}</div>
            </div>
            <div class="stat-value">${value}</div>
            <div class="stat-footer">
              ${trendHtml}
              <span class="stat-footer-text">${footer}</span>
            </div>
          </div>
        `;
      }
    }
    customElements.define('stat-card', StatCard);
  </script>
</body>
</html>
